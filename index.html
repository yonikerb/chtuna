<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>חתונה</title>
    <meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="החתונה שלנו">

<link rel="apple-touch-icon" href="logo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #d4af37; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; }
        body {
            
            font-family: 'Assistant', sans-serif;
            margin: 0; padding: 0; background-color: var(--bg); color: white;
            overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh;
        }

        #stars-layer { 
            position: fixed; top: -50px; left: -50px; width: calc(100% + 100px); height: calc(100% + 100px); 
            z-index: 1; pointer-events: none; transition: transform 0.2s ease-out;
        }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: twinkle var(--duration) infinite ease-in-out; }
        .gold-dust { position: absolute; background: var(--gold); border-radius: 50%; opacity: 0.3; filter: blur(1px); animation: drift var(--duration) infinite linear; }
        
        @keyframes twinkle { 0%, 100% { opacity: 0; } 50% { opacity: 0.5; } }
        @keyframes drift { from { transform: translateY(0); } to { transform: translateY(-100px); opacity: 0; } }

        /* סרט תמונות עם אפקט דהייה בצדדים */
        .film-strip {
            width: 100%; background: #000; padding: 25px 0;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            position: relative; z-index: 5; overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,1);
            /* אפקט דהייה (Gradient Mask) */
            -webkit-mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
            mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
        }

        .film-strip::before, .film-strip::after {
            content: ""; position: absolute; left: 0; width: 100%; height: 15px;
            background-image: radial-gradient(circle, rgba(255,255,255,0.7) 20%, transparent 60%);
            background-size: 30px 100%; z-index: 10; pointer-events: none; filter: blur(1px);
        }
        .film-strip::before { top: 5px; } .film-strip::after { bottom: 5px; }

        .film-track { 
            display: flex; 
            width: max-content; 
            animation: slide linear infinite; 
            cursor: pointer; 
            padding: 15px 0;
        }
        
        .frame { 
            width: 260px; height: 170px; margin: 0 10px; background: #111; 
            flex-shrink: 0; border-radius: 2px; overflow: hidden; transition: 0.4s;
        }
        .frame:hover { transform: scale(1.05); border: 1px solid var(--gold); z-index: 11; }
        .frame img { width: 100%; height: 100%; object-fit: cover; }

        /* תיקון האנימציה לעבודה עם RTL - תזוזה ל-50% חיובי במקום שלילי */
        @keyframes slide { 
            0% { transform: translateX(0); } 
            100% { transform: translateX(50%); } 
        }

        .main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; z-index: 10; }
        
        .greeting-area { margin-bottom: 25px; min-height: 80px; }
        #greeting-text { font-size: 1.4rem; color: var(--gold); font-weight: 700; margin-bottom: 8px; letter-spacing: 1px; }
        #quote-display { 
            font-size: 1.1rem; color: #ccc; font-style: italic; 
            transition: opacity 0.8s, transform 0.8s; opacity: 0; transform: translateY(10px);
        }

        .hebrew-title { 
            font-family: 'Assistant', sans-serif; font-size: clamp(2.8rem, 12vw, 5.5rem); 
            color: var(--gold); margin: 0; font-weight: 700; letter-spacing: -1px;
        }
        .english-sub { 
            font-family: 'Playfair Display', serif; font-size: 1.4rem; 
            color: rgba(212, 175, 55, 0.6); margin-top: 5px; letter-spacing: 3px;
        }

        .counter-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 35px 0; }
        .unit { 
            text-align: center; min-width: 85px; padding: 20px 10px; background: var(--glass); 
            border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.1);
        }
        .unit .val { font-size: 2.5rem; font-weight: 700; display: block; color: #fff; }
        .unit .lbl { font-size: 0.7rem; color: var(--gold); text-transform: uppercase; margin-top: 5px; }

        .progress-container { width: 320px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 20px; position: relative; overflow: hidden; }
        #progress-bar { height: 100%; width: 0%; background: var(--gold); box-shadow: 0 0 10px var(--gold); transition: width 0.5s ease; }
        #percent-text { font-size: 0.85rem; color: #888; margin-top: 12px; letter-spacing: 1px; }

        #lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        #lightbox.active { display: flex; }
        #lightbox img { max-width: 90%; max-height: 85%; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="stars-layer"></div>

    <div class="film-strip">
        <div class="film-track" id="track"></div>
    </div>

    <div id="lightbox" onclick="this.classList.remove('active')">
        <img id="lightbox-img" src="">
    </div>

    <div class="main">
        <div class="greeting-area">
            <div id="greeting-text">טוען...</div>
            <div id="quote-display"></div>
        </div>
        
        <h1 class="hebrew-title">א׳ בתמוז תשפ״ו</h1>
        <div class="english-sub">16 . 06 . 2026</div>
        
        <div class="counter-grid">
            <div class="unit"><span class="val" id="m-val">0</span><span class="lbl">חודשים</span></div>
            <div class="unit"><span class="val" id="d-val">0</span><span class="lbl">ימים</span></div>
            <div class="unit"><span class="val" id="h-val">0</span><span class="lbl">שעות</span></div>
            <div class="unit"><span class="val" id="min-val">0</span><span class="lbl">דקות</span></div>
            <div class="unit"><span class="val" id="sec-val">0</span><span class="lbl">שניות</span></div>
        </div>

        <div class="progress-container"><div id="progress-bar"></div></div>
        <div id="percent-text">מחשב התקדמות...</div>
    </div>

    <script>
        const starsLayer = document.getElementById('stars-layer');
        const track = document.getElementById('track');
        const quoteDisplay = document.getElementById('quote-display');
        const greetingText = document.getElementById('greeting-text');
        
        let quotes = ["מחכים לרגע המיוחד...", "עוד קצת וזה קורה", "סופרים את השניות"];
        let quoteIdx = 0;

        async function loadQuotes() {
            try {
                const response = await fetch('משפטים.txt');
                if (response.ok) {
                    const text = await response.text();
                    const lines = text.split('\n').map(s => s.trim()).filter(s => s.length > 0);
                    if (lines.length > 0) quotes = lines;
                }
            } catch (e) { console.log("שימוש בברירת מחדל"); }
            startQuoteRotation();
        }

        function startQuoteRotation() {
            function rotate() {
                updateGreeting();
                quoteDisplay.style.opacity = 0;
                quoteDisplay.style.transform = "translateY(10px)";
                setTimeout(() => {
                    quoteDisplay.innerText = quotes[quoteIdx];
                    quoteDisplay.style.opacity = 1;
                    quoteDisplay.style.transform = "translateY(0px)";
                    quoteIdx = (quoteIdx + 1) % quotes.length;
                }, 800);
            }
            setInterval(rotate, 10000); 
            rotate();
        }

        function updateGreeting() {
            const hour = new Date().getHours();
            let text = "יום קסום";
            if (hour >= 5 && hour < 12) text = "בוקר טוב";
            else if (hour >= 12 && hour < 17) text = "צהריים טובים";
            else if (hour >= 17 && hour < 21) text = "ערב טוב";
            else text = "לילה טוב";
            greetingText.innerText = text;
        }

        function createBackground() {
            for (let i = 0; i < 150; i++) {
                const isGold = Math.random() > 0.8;
                const div = document.createElement('div');
                div.className = isGold ? 'gold-dust' : 'star';
                const s = (Math.random() * (isGold ? 3 : 2)) + 'px';
                div.style.width = s; div.style.height = s;
                div.style.top = Math.random() * 100 + '%';
                div.style.left = Math.random() * 100 + '%';
                div.style.setProperty('--duration', (Math.random() * 4 + 2) + 's');
                starsLayer.appendChild(div);
            }
        }

        function createSet() {
            const container = document.createDocumentFragment();
            // הלולאה מתחילה ב-20 ויורדת ל-1 כדי שהתמונה הגבוהה תופיע ראשונה
            for (let i = 20; i >= 1; i--) {
                const f = document.createElement('div');
                f.className = 'frame';
                const img = document.createElement('img');
                img.src = `images/${i}.jpg`;
                
                img.onerror = () => { f.remove(); }; 

                img.onclick = () => {
                    document.getElementById('lightbox-img').src = img.src;
                    document.getElementById('lightbox').classList.add('active');
                };

                f.appendChild(img);
                container.appendChild(f);
            }
            return container;
        }

        function initPhotos() {
            track.appendChild(createSet());
            track.appendChild(createSet());

            setTimeout(() => {
                if(track.children.length > 0) {
                    track.style.animationDuration = '80s'; 
                }
            }, 1000);
        }

        const startDate = new Date("February 22, 2026 00:00:00");
        const targetDate = new Date("June 16, 2026 19:00:00");

        function updateCounter() {
            const now = new Date();
            const totalDuration = targetDate - startDate;
            const elapsed = now - startDate;
            const remaining = targetDate - now;

            if (remaining <= 0) {
                document.querySelector('.main').innerHTML = "<h1>❤️ הגיע הרגע! ❤️</h1>";
                return;
            }

            const percent = ((elapsed / totalDuration) * 100).toFixed(4);
            document.getElementById('progress-bar').style.width = percent + "%";
            document.getElementById('percent-text').innerText = `${percent}% מהציפייה כבר מאחורינו`;

            const sec = Math.floor(remaining / 1000);
            const days = Math.floor(sec / 86400);
            document.getElementById('m-val').innerText = Math.floor(days / 30.44);
            document.getElementById('d-val').innerText = Math.floor(days % 30.44);
            document.getElementById('h-val').innerText = Math.floor((sec % 86400) / 3600);
            document.getElementById('min-val').innerText = Math.floor((sec % 3600) / 60);
            document.getElementById('sec-val').innerText = sec % 60;
        }

        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX - window.innerWidth/2) * 0.01;
            const y = (e.clientY - window.innerHeight/2) * 0.01;
            starsLayer.style.transform = `translate(${x}px, ${y}px)`;
        });

        createBackground();
        initPhotos();
        loadQuotes();
        setInterval(updateCounter, 1000);
        updateCounter();

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(registration => {
            console.log('Service Worker registered!');
            
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    console.log('Notification permission granted.');
                }
            });
        });
    });
}

function sendTestNotification() {
    if (Notification.permission === 'granted') {
        navigator.serviceWorker.ready.then(registration => {
            registration.showNotification('סופרים את השניות!', {
                body: 'עוד יום אחד פחות בדרך לחתונה... ❤️',
                icon: 'logo.png',
                badge: 'logo.png'
            });
        });
    }
}
    </script>
</body>
</html>
