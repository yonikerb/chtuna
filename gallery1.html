<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יהונתן & יעל | רגעים קסומים</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(212, 175, 55, 0.2); }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: white; margin: 0; overflow-x: hidden; touch-action: manipulation; }
        #stars-container { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #111 0%, #050505 100%); }
        header { padding: 60px 20px 30px; text-align: center; }
        h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.8rem, 10vw, 4.5rem); color: var(--gold); margin: 0; font-style: italic; }
        
        /* כפתור העלאה */
        .upload-container { margin-top: 20px; }
        .upload-btn { display: inline-block; padding: 12px 30px; border: 1px solid var(--gold); border-radius: 50px; color: var(--gold); cursor: pointer; transition: 0.3s; background: var(--glass); font-weight: bold; }
        .upload-btn:hover { background: var(--gold); color: black; }

        .gallery-wrapper { padding: 20px; columns: 4 280px; column-gap: 20px; max-width: 1400px; margin: 0 auto; padding-bottom: 150px; }
        .photo-item { display: inline-block; width: 100%; margin-bottom: 20px; border-radius: 12px; overflow: hidden; background: var(--glass); backdrop-filter: blur(5px); border: 1px solid var(--glass-border); padding: 10px; box-sizing: border-box; cursor: pointer; opacity: 0; transform: translateY(30px); transition: all 0.6s ease; }
        .photo-item.reveal { opacity: 1; transform: translateY(0); }
        .photo-item img { width: 100%; display: block; border-radius: 6px; pointer-events: none; }

        #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.96); backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; z-index: 9999; cursor: grab; overflow: hidden; }
        #lightbox.active { display: flex; }
        #lb-img { max-width: 90%; max-height: 85vh; border: 1px solid var(--gold); border-radius: 4px; user-select: none; pointer-events: none; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s; transform-origin: center; }

        #close-btn { position: absolute; top: 30px; right: 30px; font-size: 40px; color: white; cursor: pointer; z-index: 10001; opacity: 0.7; transition: 0.3s; }
        .back-home { position: fixed; bottom: 30px; left: 30px; background: var(--gold); color: black; padding: 12px 28px; border-radius: 50px; text-decoration: none; font-weight: bold; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        @media (max-width: 600px) { .gallery-wrapper { columns: 2 150px; } }
    </style>
</head>
<body>

<div id="stars-container"></div>
<audio id="bg-music" loop><source src="images/1/1מלאך.mp3" type="audio/mpeg"></audio>

<header>
    <h1>יהונתן & יעל</h1>
    <p style="color: #888; letter-spacing: 3px;">רגעים קסומים</p>
    <div class="upload-container">
        <label for="file-upload" class="upload-btn">+ הוספת רגע קסום</label>
        <input type="file" id="file-upload" style="display:none" accept="image/*">
    </div>
</header>

<div class="gallery-wrapper" id="main-gallery"></div>

<div id="lightbox">
    <span id="close-btn">&times;</span>
    <img id="lb-img" src="">
</div>

<a href="index.html" class="back-home">חזרה</a>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getStorage, ref, listAll, getDownloadURL, uploadBytes } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDrw3XrR4KKfb6fRETtlKG8KFlLidKeuPc",
        authDomain: "ourweddingstory.firebaseapp.com",
        projectId: "ourweddingstory",
        storageBucket: "ourweddingstory.firebasestorage.app",
        messagingSenderId: "110939253444",
        appId: "1:110939253444:web:b491e5951a6ce353d53791",
        measurementId: "G-R77JLJCXKW"
    };

    const app = initializeApp(firebaseConfig);
    const storage = getStorage(app);
    
    const gallery = document.getElementById('main-gallery');
    const music = document.getElementById('bg-music');
    const lbImg = document.getElementById('lb-img');
    const lightbox = document.getElementById('lightbox');
    const closeBtn = document.getElementById('close-btn');
    const fileInput = document.getElementById('file-upload');

    let loadedImages = []; 
    let currentIndex = 0;
    let isZoomed = false;
    let startX = 0, currentX = 0, isDragging = false;

    // טעינת תמונות ראשונית
    async function loadGallery() {
        gallery.innerHTML = '';
        loadedImages = [];
        const listRef = ref(storage, 'gallery');
        try {
            const res = await listAll(listRef);
            const urls = await Promise.all(res.items.map(item => getDownloadURL(item)));
            urls.forEach((url, index) => {
                loadedImages.push(url);
                renderImage(url, index);
            });
        } catch (err) { console.error("Error loading images:", err); }
    }

    function renderImage(url, index) {
        const item = document.createElement('div');
        item.className = 'photo-item';
        item.innerHTML = `<img src="${url}">`;
        item.onclick = () => openLightbox(index);
        gallery.appendChild(item);
        setTimeout(() => item.classList.add('reveal'), 100);
    }

    // העלאת תמונה
    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const fileRef = ref(storage, 'gallery/' + Date.now() + "_" + file.name);
        try {
            await uploadBytes(fileRef, file);
            loadGallery();
        } catch (err) { alert("שגיאה בהעלאה: " + err.message); }
    });

    // מוזיקה בלחיצה ראשונה
    document.body.addEventListener('click', () => { if (music.paused) music.play(); }, { once: true });

    // Lightbox פונקציות
    function openLightbox(index) {
        currentIndex = index;
        isZoomed = false;
        lbImg.src = loadedImages[currentIndex];
        lbImg.style.transform = 'scale(1) translateX(0)';
        lightbox.style.display = 'flex';
    }

    function closeLightbox() { lightbox.style.display = 'none'; }
    closeBtn.onclick = closeLightbox;

    function toggleZoom() {
        isZoomed = !isZoomed;
        lbImg.style.transform = isZoomed ? 'scale(2)' : 'scale(1)';
    }

    function changeImage(step) {
        if (isZoomed) toggleZoom();
        currentIndex = (currentIndex + step + loadedImages.length) % loadedImages.length;
        lbImg.style.opacity = "0";
        setTimeout(() => {
            lbImg.src = loadedImages[currentIndex];
            lbImg.style.transform = 'scale(1) translateX(0)';
            lbImg.style.opacity = "1";
        }, 150);
    }

    // גרירה וזום
    lightbox.onmousedown = lightbox.ontouchstart = (e) => {
        if (isZoomed) return;
        isDragging = true;
        startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
    };

    window.onmousemove = window.ontouchmove = (e) => {
        if (!isDragging) return;
        currentX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        lbImg.style.transform = `translateX(${currentX - startX}px)`;
    };

    window.onmouseup = window.ontouchend = () => {
        if (!isDragging) return;
        isDragging = false;
        const diff = currentX - startX;
        if (Math.abs(diff) > 80) changeImage(diff > 0 ? -1 : 1);
        else lbImg.style.transform = 'scale(1) translateX(0)';
    };

    lightbox.ondblclick = toggleZoom;

    // כוכבים ברקע
    for (let i = 0; i < 50; i++) {
        const s = document.createElement('div');
        s.style.cssText = `position:absolute; width:2px; height:2px; background:white; top:${Math.random()*100}%; left:${Math.random()*100}%; opacity:0.3; border-radius:50%;`;
        document.getElementById('stars-container').appendChild(s);
    }

    loadGallery();
</script>
</body>
</html>
