<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יהונתן & יעל | רגעים קסומים</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); }
        
        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg);
            color: white; margin: 0; overflow-x: hidden; min-height: 100vh;
        }

        #stars-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        header { padding: 80px 20px 40px; text-align: center; }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.8rem, 10vw, 4.5rem);
            color: var(--gold); margin: 0; font-style: italic;
        }

        .sub-title { color: #888; letter-spacing: 4px; font-size: 0.9rem; margin-top: 15px; }

        .gallery-wrapper {
            padding: 20px;
            columns: 4 280px; 
            column-gap: 15px;
            max-width: 1600px;
            margin: 0 auto;
            padding-bottom: 120px;
        }

        .photo-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 15px;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            background: var(--glass);
            border: 1px solid rgba(212, 175, 55, 0.1);
            cursor: pointer;
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .photo-item.reveal { opacity: 1; transform: translateY(0); }

        .photo-item:hover { border-color: var(--gold); box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2); }

        .photo-item img {
            width: 100%; display: block; transition: transform 0.6s ease;
        }

        .photo-item:hover img { transform: scale(1.05); }

        #lightbox {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px); display: none;
            justify-content: center; align-items: center; z-index: 9999;
        }
        #lightbox.active { display: flex; }
        #lightbox img { max-width: 90%; max-height: 85vh; border: 1px solid var(--gold); }

        .back-home {
            position: fixed; bottom: 30px; left: 30px;
            background: var(--gold); color: black; padding: 12px 25px;
            border-radius: 50px; text-decoration: none; font-weight: bold; z-index: 100;
        }

        @media (max-width: 600px) { .gallery-wrapper { columns: 2 150px; } }
    </style>
</head>
<body>

<div id="stars-container"></div>

<header>
    <h1>יהונתן & יעל</h1>
    <div class="sub-title">16.06.2026 | OUR MOMENTS</div>
</header>

<div class="gallery-wrapper" id="main-gallery"></div>

<div id="lightbox" onclick="this.classList.remove('active')">
    <img id="lb-img" src="">
</div>

<a href="index.html" class="back-home">↩ חזרה לדף הבית</a>

<script>
    // רשימת השמות שלכם (רק השם ללא הסיומת, הקוד בודק את כל הפורמטים)
    const photoData = [
        { id: "1", date: "2025-05-10" },
        { id: "2", date: "2025-06-15" },
        { id: "proposal", date: "2026-01-01" },
        { id: "pre_wedding", date: "2026-03-20" }
        // הוסיפו כאן עוד תמונות, הקפידו על הפורמט { id: "שם_קובץ", date: "YYYY-MM-DD" }
    ];

    // מיון לפי תאריך מהחדש לישן
    photoData.sort((a, b) => new Date(b.date) - new Date(a.date));

    const gallery = document.getElementById('main-gallery');
    const formats = ['jpg', 'JPG', 'png', 'PNG', 'heic', 'HEIC', 'jpeg'];

    const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('reveal');
                revealObserver.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1 });

    photoData.forEach((photo) => {
        const item = document.createElement('div');
        item.className = 'photo-item';
        
        const img = document.createElement('img');
        let currentFormatIndex = 0;

        // פונקציה חכמה לניסיון טעינה של פורמטים שונים אם אחד נכשל
        function tryLoadFormat() {
            if (currentFormatIndex < formats.length) {
                img.src = `images/${photo.id}.${formats[currentFormatIndex]}`;
                currentFormatIndex++;
            } else {
                item.remove(); // אם אף פורמט לא עבד, מסירים את התיבה
            }
        }

        img.onerror = tryLoadFormat;
        tryLoadFormat(); // תחילת ניסיון טעינה

        // המיכל נשאר נקי רק עם התמונה
        item.appendChild(img);
        
        item.onclick = () => {
            document.getElementById('lb-img').src = img.src;
            document.getElementById('lightbox').classList.add('active');
        };

        gallery.appendChild(item);
        revealObserver.observe(item);
    });

    // כוכבים ברקע
    const starsContainer = document.getElementById('stars-container');
    for (let i = 0; i < 80; i++) {
        const star = document.createElement('div');
        star.style.cssText = `position:absolute; width:2px; height:2px; background:white; top:${Math.random()*100}%; left:${Math.random()*100}%; opacity:${Math.random()*0.6}; border-radius:50%;`;
        starsContainer.appendChild(star);
    }
</script>

</body>
</html>
