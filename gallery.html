<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יהונתן & יעל | גלריה</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg); color: white; margin: 0; overflow-x: hidden; }
        #stars-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #111 0%, #050505 100%); }
        header { padding: 60px 20px; text-align: center; }
        h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 8vw, 4rem); color: var(--gold); margin: 0; font-style: italic; }
        .gallery-wrapper { padding: 20px; columns: 4 250px; column-gap: 15px; max-width: 1400px; margin: 0 auto; }
        .photo-item { 
            display: inline-block; width: 100%; margin-bottom: 15px; border-radius: 8px; overflow: hidden; 
            background: var(--glass); border: 1px solid rgba(212, 175, 55, 0.1); cursor: pointer;
            opacity: 0; transform: translateY(30px); transition: all 0.6s ease-out;
        }
        .photo-item.reveal { opacity: 1; transform: translateY(0); }
        .photo-item img { width: 100%; display: block; transition: 0.5s; }
        .photo-item:hover img { transform: scale(1.05); }
        #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; z-index: 9999; }
        #lightbox.active { display: flex; }
        #lightbox img { max-width: 90%; max-height: 80vh; border: 1px solid var(--gold); }
        .back-home { position: fixed; bottom: 30px; left: 30px; background: var(--gold); color: black; padding: 12px 25px; border-radius: 50px; text-decoration: none; font-weight: bold; z-index: 100; }
        @media (max-width: 600px) { .gallery-wrapper { columns: 2 150px; } }
    </style>
</head>
<body>

<div id="stars-container"></div>
<header>
    <h1>יהונתן & יעל</h1>
    <p style="color: #888;">הגלריה שלנו</p>
</header>

<div class="gallery-wrapper" id="main-gallery"></div>

<div id="lightbox" onclick="this.classList.remove('active')">
    <img id="lb-img">
</div>

<a href="index.html" class="back-home">↩ חזרה</a>

<script>
    const gallery = document.getElementById('main-gallery');
    
    // 1. רשימת קבצים ידנית (כאן תרשום את כל מה שלא מספר, למשל "proposal")
    const specialPhotos = ["proposal", "beach", "engagement"]; 
    
    // 2. כמות תמונות ממוספרות (כמו בדף הראשון)
    const maxNumberedPhotos = 50; 

    const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('reveal');
                revealObserver.unobserve(entry.target);
            }
        });
    }, { threshold: 0.1 });

    function createPhotoItem(fileName) {
        const item = document.createElement('div');
        item.className = 'photo-item';
        const img = document.createElement('img');
        
        // ניסיון טעינה של כמה פורמטים לכל תמונה
        const formats = ['jpg', 'JPG', 'png', 'HEIC', 'jpeg'];
        let fmtIdx = 0;

        function tryNextFormat() {
            if (fmtIdx < formats.length) {
                img.src = `images/${fileName}.${formats[fmtIdx]}`;
                fmtIdx++;
            } else {
                item.remove(); // אם לא נמצא בכלל, נמחק את התיבה
            }
        }

        img.onerror = tryNextFormat;
        tryNextFormat();

        item.appendChild(img);
        item.onclick = () => {
            document.getElementById('lb-img').src = img.src;
            document.getElementById('lightbox').classList.add('active');
        };
        
        gallery.appendChild(item);
        revealObserver.observe(item);
    }

    // קודם טוען את המיוחדות
    specialPhotos.forEach(name => createPhotoItem(name));
    
    // אחר כך טוען את הממוספרות (מהסוף להתחלה כדי שהחדשות יהיו למעלה)
    for (let i = maxNumberedPhotos; i >= 1; i--) {
        createPhotoItem(i);
    }

    // כוכבים
    for (let i = 0; i < 50; i++) {
        const s = document.createElement('div');
        s.style.cssText = `position:absolute; width:2px; height:2px; background:white; top:${Math.random()*100}%; left:${Math.random()*100}%; opacity:0.5;`;
        document.getElementById('stars-container').appendChild(s);
    }
</script>
</body>
</html>
