<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הסיפור שלנו - Classic Luxury</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600&family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

    <style>
        :root {
            --dark-bg: #050505;
            --glass-bg: rgba(30, 30, 30, 0.45);
            --glass-border: rgba(255, 255, 255, 0.06);
            --gold: #c5a059;
            --soft-white: #e0e0e0;
            --blur: blur(15px);
        }

        body {
            margin: 0; padding: 0; background-color: var(--dark-bg); color: var(--soft-white);
            font-family: 'Assistant', sans-serif; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #121212 0%, #000 100%);
        }

        /* הדר קטן ויוקרתי יותר */
        header {
            height: 40vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center;
        }

        header h1 {
            font-family: 'Cinzel Decorative', serif; font-size: clamp(2rem, 7vw, 4rem);
            color: var(--gold); margin: 0; letter-spacing: 3px;
        }

        header p {
            font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-style: italic;
            opacity: 0.6; margin-top: 10px;
        }

        /* ציר זמן */
        #story-timeline { max-width: 1000px; margin: 0 auto; padding: 20px; }

        .story-row {
            display: flex; align-items: stretch; justify-content: center;
            margin-bottom: 60px; gap: 30px; position: relative;
        }

        .story-row:nth-child(even) { flex-direction: row-reverse; }

        /* כרטיסי טקסט - ללא תזוזה */
        .text-box {
            flex: 0 0 45%; padding: 25px;
            background: var(--glass-bg); backdrop-filter: var(--blur);
            border-radius: 15px; border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .hebrew-date { color: var(--gold); font-weight: 600; font-size: 1rem; display: block; }
        .latin-date { font-size: 0.75rem; color: #666; display: block; margin-top: 2px; }

        .text-box h2 {
            font-family: 'Cinzel Decorative', serif; font-size: 1.5rem;
            color: #fff; margin: 12px 0;
        }

        .text-box p { font-size: 0.95rem; line-height: 1.6; color: #bbb; margin: 0; }

        /* תמונות - ללא תזוזה או אפקטים */
        .image-box {
            flex: 0 0 45%; overflow: hidden; border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .image-box img {
            width: 100%; height: 100%; min-height: 250px; object-fit: cover;
            display: block; transition: none; /* ביטול אנימציית הגדלה */
        }

        /* כפתור הוספה צף - קטן וקבוע */
        .add-btn-fixed {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            padding: 12px 30px; background: var(--dark-bg); color: var(--gold);
            border: 1px solid var(--gold); font-family: 'Assistant', sans-serif;
            font-size: 0.9rem; border-radius: 30px; cursor: pointer; z-index: 1000;
            transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .add-btn-fixed:hover { background: var(--gold); color: #000; }

        /* מודאל העלאה */
        #upload-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 2000;
            justify-content: center; align-items: center;
        }

        .modal-content {
            background: #111; padding: 30px; border-radius: 20px;
            width: 90%; max-width: 400px; border: 1px solid #333;
        }

        input, textarea {
            width: 100%; padding: 12px; margin: 10px 0; background: #1a1a1a;
            color: white; border: 1px solid #333; border-radius: 8px; box-sizing: border-box;
        }

        .submit-btn {
            width: 100%; background: var(--gold); color: #000; padding: 15px;
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px;
        }

        /* התאמה למובייל - Side by Side קטן */
        @media (max-width: 768px) {
            .story-row, .story-row:nth-child(even) { 
                flex-direction: row !important; gap: 10px; margin-bottom: 40px; 
            }
            .image-box, .text-box { flex: 0 0 calc(50% - 5px); padding: 12px; }
            .image-box img { min-height: 150px; height: 180px; }
            .text-box h2 { font-size: 1.1rem; }
            .text-box p { font-size: 0.85rem; }
            header { height: 30vh; }
            header h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <header data-aos="fade">
        <h1>הסיפור שלנו</h1>
        <p>הרגעים היפים ביותר שלנו</p>
    </header>

    <div id="story-timeline">
        </div>

    <button class="add-btn-fixed" onclick="openModal()">+ הוסף פרק</button>

    <div id="upload-modal">
        <div class="modal-content">
            <h3 style="color: var(--gold); text-align: center;">הוספת פרק חדש</h3>
            <input type="text" id="chapter-title" placeholder="כותרת">
            <textarea id="chapter-desc" rows="4" placeholder="תיאור קצר"></textarea>
            <input type="date" id="chapter-date">
            <input type="file" id="chapter-file" accept="image/*">
            <button class="submit-btn" id="save-btn" onclick="processNewChapter()">שמור פרק</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#666; width:100%; margin-top:10px; cursor:pointer;">ביטול</button>
        </div>
    </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDrw3XrR4KKfb6fRETtlKG8KFlLidKeuPc",
          authDomain: "ourweddingstory.firebaseapp.com",
          projectId: "ourweddingstory",
          storageBucket: "ourweddingstory.firebasestorage.app",
          messagingSenderId: "110939253444",
          appId: "1:110939253444:web:b491e5951a6ce353d53791"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        window.openModal = () => document.getElementById('upload-modal').style.display = 'flex';
        window.closeModal = () => document.getElementById('upload-modal').style.display = 'none';

        async function loadTimeline() {
            const q = query(collection(db, "chapters"), orderBy("timestamp", "asc"));
            const querySnapshot = await getDocs(q);
            const timeline = document.getElementById('story-timeline');
            timeline.innerHTML = '';
            
            let counter = 0;
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const row = document.createElement('div');
                row.className = 'story-row';
                if (counter % 2 !== 0) row.style.flexDirection = 'row-reverse';

                row.setAttribute('data-aos', 'fade-up');
                row.innerHTML = `
                    <div class="image-box"><img src="${data.img}"></div>
                    <div class="text-box">
                        <span class="hebrew-date">${data.hebDate}</span>
                        <span class="latin-date">${data.latDate}</span>
                        <h2>${data.title}</h2>
                        <p>${data.desc}</p>
                    </div>
                `;
                timeline.appendChild(row);
                counter++;
            });
            AOS.refresh();
        }

        window.processNewChapter = async function() {
            const title = document.getElementById('chapter-title').value;
            const desc = document.getElementById('chapter-desc').value;
            const latinDate = document.getElementById('chapter-date').value;
            const file = document.getElementById('chapter-file').files[0];
            const btn = document.getElementById('save-btn');

            if(!title || !latinDate || !file) return alert("נא למלא הכל");
            btn.disabled = true;
            btn.innerText = "מעלה...";

            try {
                const storageRef = ref(storage, 'uploads/' + Date.now() + "_" + file.name);
                await uploadBytes(storageRef, file);
                const imgUrl = await getDownloadURL(storageRef);

                const [y, m, d] = latinDate.split('-');
                const res = await fetch(`https://www.hebcal.com/converter?cfg=json&gy=${y}&gm=${m}&gd=${d}&g2h=1`);
                const dateData = await res.json();

                await addDoc(collection(db, "chapters"), {
                    title, desc, img: imgUrl,
                    hebDate: dateData.hebrew,
                    latDate: `${d}.${m}.${y}`,
                    timestamp: new Date()
                });

                location.reload();
            } catch (e) {
                alert("שגיאה!");
                btn.disabled = false;
            }
        };

        loadTimeline();
        AOS.init({ duration: 800, once: true });
    </script>
</body>
</html>
