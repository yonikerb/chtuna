<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הסיפור שלנו - Wedding Story</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

    <style>
        :root {
            --dark-bg: #030303;
            --glass: rgba(25, 25, 25, 0.7);
            --gold: #d4af37;
            --gold-bright: #ffdf7e;
            --blur: blur(20px) saturate(180%);
        }

        body {
            margin: 0; background-color: var(--dark-bg); color: #f5f5f5;
            font-family: 'Assistant', sans-serif; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
        }

        header {
            height: 45vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 20px;
        }

        header h1 {
            font-family: 'Cinzel Decorative', serif; font-size: clamp(2.5rem, 8vw, 5rem);
            color: var(--gold); text-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
            margin: 0;
        }

        #story-timeline { max-width: 1100px; margin: 0 auto; padding: 20px; padding-bottom: 150px; }

        .story-row {
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 80px; gap: 40px; transition: 0.5s;
        }

        .image-box { flex: 0 0 45%; border-radius: 20px; overflow: hidden; height: 350px; box-shadow: 0 15px 40px #000; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; transition: 1s; }

        .text-box {
            flex: 0 0 45%; padding: 30px; background: var(--glass);
            backdrop-filter: var(--blur); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);
        }

        .hebrew-date { color: var(--gold); font-weight: 700; font-size: 1.2rem; display: block; }
        .latin-date { font-size: 0.8rem; color: #888; margin-bottom: 10px; display: block; }
        .text-box h2 { font-family: 'Cinzel Decorative', serif; font-size: 2rem; margin: 10px 0; color: #fff; }

        /* כפתור הוספה צף */
        .add-btn-fixed {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 18px 45px; background: var(--gold); color: #000;
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.5); z-index: 1000;
            font-size: 1.1rem; transition: 0.3s;
        }
        .add-btn-fixed:active { transform: translateX(-50%) scale(0.95); }

        /* מודאל העלאה */
        #upload-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 2000;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--glass); padding: 30px; border-radius: 25px;
            width: 90%; max-width: 450px; border: 1px solid var(--gold);
            max-height: 90vh; overflow-y: auto;
        }
        input, textarea {
            width: 100%; padding: 14px; margin: 10px 0; background: rgba(255,255,255,0.05);
            color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; box-sizing: border-box;
            font-size: 1rem;
        }

        .submit-btn {
            width: 100%; padding: 16px; background: var(--gold); border: none;
            border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1.1rem;
            margin-top: 15px;
        }

        /* התאמה לנייד */
        @media (max-width: 768px) {
            .story-row { flex-direction: column !important; text-align: center; gap: 20px; }
            .image-box, .text-box { flex: 0 0 100%; width: 100%; }
            .image-box { height: 280px; }
            header h1 { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

    <header data-aos="fade">
        <h1 data-aos="zoom-in">הסיפור שלנו</h1>
        <p style="opacity: 0.7;">הרגעים הגדולים של החיים</p>
    </header>

    <div id="story-timeline">
        </div>

    <button class="add-btn-fixed" onclick="openModal()">+ הוסף פרק חדש</button>

    <div id="upload-modal">
        <div class="modal-content">
            <h3 style="color: var(--gold); text-align: center; font-family: 'Cinzel Decorative';">יצירת פרק חדש</h3>
            <input type="text" id="chapter-title" placeholder="כותרת הפרק">
            <textarea id="chapter-desc" rows="3" placeholder="מה קרה בפרק הזה?"></textarea>
            
            <label style="font-size: 0.85rem; color: var(--gold); display: block; margin-top: 10px;">תאריך לועזי:</label>
            <input type="date" id="chapter-date">
            
            <label style="font-size: 0.85rem; color: var(--gold); display: block; margin-top: 10px;">בחר תמונה מהגלריה:</label>
            <input type="file" id="chapter-file" accept="image/*" style="border: none; padding: 5px;">
            
            <button class="submit-btn" id="save-btn" onclick="processNewChapter()">פרסם לסיפור</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#888; width:100%; margin-top:15px; cursor:pointer;">ביטול</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // ה-Config האישי שלך
        const firebaseConfig = {
          apiKey: "AIzaSyDrw3XrR4KKfb6fRETtlKG8KFlLidKeuPc",
          authDomain: "ourweddingstory.firebaseapp.com",
          projectId: "ourweddingstory",
          storageBucket: "ourweddingstory.firebasestorage.app",
          messagingSenderId: "110939253444",
          appId: "1:110939253444:web:b491e5951a6ce353d53791",
          measurementId: "G-R77JLJCXKW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        window.openModal = () => document.getElementById('upload-modal').style.display = 'flex';
        window.closeModal = () => document.getElementById('upload-modal').style.display = 'none';

        // משיכת נתונים בסדר עולה (מהישן לחדש)
        async function loadTimeline() {
            const q = query(collection(db, "chapters"), orderBy("timestamp", "asc"));
            const querySnapshot = await getDocs(q);
            const timeline = document.getElementById('story-timeline');
            timeline.innerHTML = '';
            
            let counter = 0;

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const row = document.createElement('div');
                row.className = 'story-row';
                
                // יצירת אפקט הזיג-זג לפי המונה
                if (counter % 2 !== 0) {
                    row.style.flexDirection = 'row-reverse';
                }

                row.setAttribute('data-aos', counter % 2 === 0 ? 'fade-left' : 'fade-right');
                
                row.innerHTML = `
                    <div class="image-box"><img src="${data.img}"></div>
                    <div class="text-box">
                        <span class="hebrew-date">${data.hebDate}</span>
                        <span class="latin-date">${data.latDate}</span>
                        <h2>${data.title}</h2>
                        <p style="color:#ccc; line-height: 1.6;">${data.desc}</p>
                    </div>
                `;
                timeline.appendChild(row);
                counter++;
            });
            AOS.refresh();
        }

        // העלאה ושמירה
        window.processNewChapter = async function() {
            const title = document.getElementById('chapter-title').value;
            const desc = document.getElementById('chapter-desc').value;
            const latinDate = document.getElementById('chapter-date').value;
            const file = document.getElementById('chapter-file').files[0];
            const btn = document.getElementById('save-btn');

            if(!title || !latinDate || !file) return alert("נא למלא את כל השדות ולבחור תמונה");

            btn.disabled = true;
            btn.innerText = "מעלה רגע קסום...";

            try {
                // 1. העלאה ל-Storage
                const storageRef = ref(storage, 'uploads/' + Date.now() + "_" + file.name);
                await uploadBytes(storageRef, file);
                const imgUrl = await getDownloadURL(storageRef);

                // 2. המרה לתאריך עברי
                const [y, m, d] = latinDate.split('-');
                const res = await fetch(`https://www.hebcal.com/converter?cfg=json&gy=${y}&gm=${m}&gd=${d}&g2h=1`);
                const dateData = await res.json();

                // 3. שמירה ל-Firestore
                await addDoc(collection(db, "chapters"), {
                    title, desc, img: imgUrl,
                    hebDate: dateData.hebrew,
                    latDate: `${d}.${m}.${y}`,
                    timestamp: new Date()
                });

                closeModal();
                location.reload();
            } catch (e) {
                console.error(e);
                alert("קרתה שגיאה. וודא שהגדרת Rules ב-Firebase.");
                btn.disabled = false;
                btn.innerText = "פרסם לסיפור";
            }
        };

        loadTimeline();
    </script>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>AOS.init({ duration: 1000, once: true });</script>
</body>
</html>
