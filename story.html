<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הסיפור שלנו - אחסון ענן מלא</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

    <style>
        :root { --dark-bg: #030303; --glass: rgba(25, 25, 25, 0.7); --gold: #d4af37; --blur: blur(20px); }
        body { margin: 0; background: var(--dark-bg); color: #f5f5f5; font-family: 'Assistant', sans-serif; overflow-x: hidden; }
        header { height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        header h1 { font-family: 'Cinzel Decorative', serif; font-size: 3.5rem; color: var(--gold); margin: 0; }
        
        #story-timeline { max-width: 1000px; margin: 0 auto; padding: 20px; padding-bottom: 120px; }
        .story-row { display: flex; align-items: center; justify-content: center; margin-bottom: 50px; gap: 25px; }
        .story-row:nth-child(even) { flex-direction: row-reverse; }
        .image-box { flex: 0 0 45%; border-radius: 20px; overflow: hidden; height: 280px; box-shadow: 0 10px 30px #000; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; }
        .text-box { flex: 0 0 45%; padding: 25px; background: var(--glass); backdrop-filter: var(--blur); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        
        .hebrew-date { color: var(--gold); font-weight: 700; display: block; }
        .latin-date { font-size: 0.8rem; color: #888; display: block; margin-bottom: 5px; }

        .add-btn-fixed { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 15px 40px; background: var(--gold); border: none; border-radius: 50px; font-weight: bold; cursor: pointer; z-index: 1000; box-shadow: 0 5px 20px rgba(212,175,55,0.4); }

        #upload-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .modal-content { background: var(--glass); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid var(--gold); }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        @media (max-width: 768px) { .story-row, .story-row:nth-child(even) { flex-direction: column; text-align: center; } .image-box, .text-box { width: 100%; flex: 0 0 100%; } }
    </style>
</head>
<body>

    <header data-aos="fade">
        <h1>הסיפור שלנו</h1>
    </header>

    <div id="story-timeline"></div>

    <button class="add-btn-fixed" onclick="openModal()">+ הוסף פרק חדש</button>

    <div id="upload-modal">
        <div class="modal-content">
            <h3 style="color: var(--gold); text-align: center;">העלאת רגע חדש</h3>
            <input type="text" id="chapter-title" placeholder="כותרת">
            <textarea id="chapter-desc" rows="3" placeholder="מה קרה שם?"></textarea>
            <input type="date" id="chapter-date">
            <label style="font-size: 0.8rem; color: var(--gold);">בחר תמונה מהגלריה:</label>
            <input type="file" id="chapter-file" accept="image/*">
            <button class="submit-btn" id="save-btn" onclick="processNewChapter()">פרסם לסיפור</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#888; width:100%; margin-top:10px; cursor:pointer;">ביטול</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDrw3XrR4KKfb6fRETtlKG8KFlLidKeuPc",
          authDomain: "ourweddingstory.firebaseapp.com",
          projectId: "ourweddingstory",
          storageBucket: "ourweddingstory.firebasestorage.app",
          messagingSenderId: "110939253444",
          appId: "1:110939253444:web:b491e5951a6ce353d53791",
          measurementId: "G-R77JLJCXKW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        window.openModal = () => document.getElementById('upload-modal').style.display = 'flex';
        window.closeModal = () => document.getElementById('upload-modal').style.display = 'none';

        async function loadTimeline() {
            const q = query(collection(db, "chapters"), orderBy("timestamp", "desc"));
            const querySnapshot = await getDocs(q);
            const timeline = document.getElementById('story-timeline');
            timeline.innerHTML = '';
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const row = document.createElement('div');
                row.className = 'story-row';
                row.setAttribute('data-aos', 'fade-up');
                row.innerHTML = `<div class="image-box"><img src="${data.img}"></div>
                    <div class="text-box">
                        <span class="hebrew-date">${data.hebDate}</span>
                        <span class="latin-date">${data.latDate}</span>
                        <h2 style="margin:5px 0;">${data.title}</h2>
                        <p style="color:#ccc; font-size:0.95rem;">${data.desc}</p>
                    </div>`;
                timeline.appendChild(row);
            });
            AOS.refresh();
        }

        window.processNewChapter = async function() {
            const title = document.getElementById('chapter-title').value;
            const desc = document.getElementById('chapter-desc').value;
            const latinDate = document.getElementById('chapter-date').value;
            const file = document.getElementById('chapter-file').files[0];
            const btn = document.getElementById('save-btn');

            if(!title || !latinDate || !file) return alert("מלא את כל הפרטים ובחר תמונה");

            btn.disabled = true;
            btn.innerText = "מעלה תמונה...";

            try {
                // 1. העלאת התמונה ל-Storage
                const storageRef = ref(storage, 'uploads/' + Date.now() + "_" + file.name);
                await uploadBytes(storageRef, file);
                const imgUrl = await getDownloadURL(storageRef);

                // 2. תרגום לתאריך עברי
                const [y, m, d] = latinDate.split('-');
                const res = await fetch(`https://www.hebcal.com/converter?cfg=json&gy=${y}&gm=${m}&gd=${d}&g2h=1`);
                const dateData = await res.json();

                // 3. שמירה ל-Firestore
                await addDoc(collection(db, "chapters"), {
                    title, desc, img: imgUrl,
                    hebDate: dateData.hebrew,
                    latDate: `${d}.${m}.${y}`,
                    timestamp: new Date()
                });

                closeModal();
                location.reload();
            } catch (e) {
                console.error(e);
                alert("שגיאה! וודא ששדרגת לתוכנית Blaze ופתחת הרשאות ב-Storage וב-Firestore.");
                btn.disabled = false;
            }
        };

        loadTimeline();
    </script>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>AOS.init({ duration: 800 });</script>
</body>
</html>
