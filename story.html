<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הסיפור שלנו - Mobile Luxury</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

    <style>
        :root {
            --dark-bg: #080808;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --gold: #d4af37;
            --text: #e0e0e0;
        }

        body {
            margin: 0; padding: 0; background-color: var(--dark-bg); color: var(--text);
            font-family: 'Assistant', sans-serif; overflow-x: hidden;
            background-image: radial-gradient(circle at top, #1a1a1a 0%, #080808 100%);
        }

        header {
            height: 35vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center;
        }

        header h1 {
            font-family: 'Cinzel Decorative', serif; font-size: 2.5rem;
            color: var(--gold); margin: 0; text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        #story-timeline { max-width: 800px; margin: 0 auto; padding: 10px; padding-bottom: 100px; }

        /* מבנה הכרטיס החדש */
        .story-card {
            display: flex; align-items: stretch; 
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            margin-bottom: 25px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            height: 160px; /* גובה קבוע לכל הכרטיסים במובייל */
        }

        .story-card:nth-child(even) { flex-direction: row-reverse; }

        .image-box { flex: 0 0 40%; position: relative; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .text-box { 
            flex: 1; padding: 15px; display: flex; flex-direction: column; justify-content: center;
            overflow: hidden;
        }

        .date-container { margin-bottom: 5px; }
        .hebrew-date { color: var(--gold); font-weight: 600; font-size: 0.85rem; display: block; }
        .latin-date { font-size: 0.65rem; color: #666; display: block; }

        .text-box h2 {
            font-family: 'Cinzel Decorative', serif; font-size: 1.1rem;
            color: #fff; margin: 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .text-box p { 
            font-size: 0.8rem; line-height: 1.4; color: #bbb; margin: 0;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }

        /* כפתור הוספה עגול ויוקרתי בצד */
        .add-btn-fixed {
            position: fixed; bottom: 30px; left: 30px;
            width: 60px; height: 60px; background: var(--gold); color: #000;
            border: none; border-radius: 50%; cursor: pointer; z-index: 1000;
            box-shadow: 0 10px 25px rgba(212,175,55,0.4);
            font-size: 1.8rem; display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }

        /* מודאל */
        #upload-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); z-index: 2000;
            justify-content: center; align-items: center;
        }
        .modal-content { background: #151515; padding: 25px; border-radius: 25px; width: 85%; border: 1px solid #333; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #222; color: #fff; border: 1px solid #444; border-radius: 10px; box-sizing: border-box; }
        .submit-btn { width: 100%; background: var(--gold); color: #000; padding: 15px; border: none; border-radius: 10px; font-weight: bold; }

        @media (min-width: 769px) {
            .story-card { height: 250px; margin-bottom: 50px; }
            .text-box h2 { font-size: 1.8rem; }
            .text-box p { font-size: 1.1rem; -webkit-line-clamp: 5; }
        }
    </style>
</head>
<body>

    <header data-aos="fade">
        <h1>הסיפור שלנו</h1>
        <p>Your Forever Story</p>
    </header>

    <div id="story-timeline"></div>

    <button class="add-btn-fixed" onclick="openModal()">+</button>

    <div id="upload-modal">
        <div class="modal-content">
            <h3 style="color: var(--gold); text-align: center;">הוספת רגע</h3>
            <input type="text" id="chapter-title" placeholder="כותרת">
            <textarea id="chapter-desc" rows="3" placeholder="מה קרה שם?"></textarea>
            <input type="date" id="chapter-date">
            <input type="file" id="chapter-file" accept="image/*">
            <button class="submit-btn" id="save-btn" onclick="processNewChapter()">פרסם</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#555; width:100%; margin-top:15px; cursor:pointer;">ביטול</button>
        </div>
    </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDrw3XrR4KKfb6fRETtlKG8KFlLidKeuPc",
          authDomain: "ourweddingstory.firebaseapp.com",
          projectId: "ourweddingstory",
          storageBucket: "ourweddingstory.firebasestorage.app",
          messagingSenderId: "110939253444",
          appId: "1:110939253444:web:b491e5951a6ce353d53791"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        window.openModal = () => document.getElementById('upload-modal').style.display = 'flex';
        window.closeModal = () => document.getElementById('upload-modal').style.display = 'none';

        async function loadTimeline() {
            const q = query(collection(db, "chapters"), orderBy("timestamp", "asc"));
            const querySnapshot = await getDocs(q);
            const timeline = document.getElementById('story-timeline');
            timeline.innerHTML = '';
            
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const card = document.createElement('div');
                card.className = 'story-card';
                card.setAttribute('data-aos', 'fade-up');
                card.innerHTML = `
                    <div class="image-box"><img src="${data.img}"></div>
                    <div class="text-box">
                        <div class="date-container">
                            <span class="hebrew-date">${data.hebDate}</span>
                            <span class="latin-date">${data.latDate}</span>
                        </div>
                        <h2>${data.title}</h2>
                        <p>${data.desc}</p>
                    </div>
                `;
                timeline.appendChild(card);
            });
            AOS.refresh();
        }

        window.processNewChapter = async function() {
            const title = document.getElementById('chapter-title').value;
            const desc = document.getElementById('chapter-desc').value;
            const latinDate = document.getElementById('chapter-date').value;
            const file = document.getElementById('chapter-file').files[0];
            const btn = document.getElementById('save-btn');

            if(!title || !latinDate || !file) return alert("מלא את כל הפרטים");
            btn.disabled = true; btn.innerText = "...";

            try {
                const storageRef = ref(storage, 'uploads/' + Date.now() + "_" + file.name);
                await uploadBytes(storageRef, file);
                const imgUrl = await getDownloadURL(storageRef);

                const [y, m, d] = latinDate.split('-');
                const res = await fetch(`https://www.hebcal.com/converter?cfg=json&gy=${y}&gm=${m}&gd=${d}&g2h=1`);
                const dateData = await res.json();

                await addDoc(collection(db, "chapters"), {
                    title, desc, img: imgUrl, hebDate: dateData.hebrew, latDate: `${d}.${m}.${y}`, timestamp: new Date()
                });
                location.reload();
            } catch (e) { alert("שגיאה!"); btn.disabled = false; }
        };

        loadTimeline();
        AOS.init({ duration: 600, once: true });
    </script>
</body>
</html>
