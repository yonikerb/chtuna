<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הסיפור שלנו - יוקרת זכוכית Ultra</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

    <style>
        :root {
            --dark-bg: #030303;
            --glass-bg: rgba(20, 20, 20, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --gold: #d4af37;
            --gold-bright: #ffdf7e;
            --soft-white: #f5f5f5;
            --blur: blur(20px) saturate(190%);
            --shadow-glass: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        /* סרגל גלילה יוקרתי */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--dark-bg); }
        ::-webkit-scrollbar-thumb { background: linear-gradient(to bottom, var(--dark-bg), var(--gold), var(--dark-bg)); border-radius: 3px; }

        body {
            margin: 0; padding: 0;
            background-color: var(--dark-bg);
            color: var(--soft-white);
            font-family: 'Assistant', sans-serif;
            overflow-x: hidden;
            /* רקע עם "נצנוצים" עדינים */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 90%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                url('https://www.transparenttextures.com/patterns/dark-dotted-2.png');
        }

        /* --- הדר דרמטי Ultra --- */
        header {
            height: 90vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            position: relative;
        }

        header::before {
            content: ''; position: absolute; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1519225421980-715cb0215aed?q=80&w=2000') no-repeat center center/cover;
            opacity: 0.12; filter: grayscale(100%);
        }

        header h1 {
            font-family: 'Cinzel Decorative', serif; font-size: 6rem;
            color: var(--gold); margin: 0; text-shadow: 0 0 30px rgba(212, 175, 55, 0.6);
            z-index: 1; letter-spacing: 5px;
            animation: textGlow 3s ease-in-out infinite alternate;
        }

        header p {
            font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-style: italic;
            z-index: 1; opacity: 0.8; margin-top: 15px;
        }

        @keyframes textGlow {
            from { text-shadow: 0 0 30px rgba(212, 175, 55, 0.6); }
            to { text-shadow: 0 0 50px rgba(212, 175, 55, 0.9), 0 0 10px rgba(255, 255, 255, 0.5); }
        }

        /* --- ציר הזמן (הסיפור) --- */
        #story-timeline {
            max-width: 1400px; margin: 0 auto; padding: 100px 20px;
        }

        .story-row {
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 180px; gap: 100px;
            position: relative;
        }

        .story-row:nth-child(even) { flex-direction: row-reverse; }

        /* אפקט ה-Glassmorphism Ultra לקארד */
        .text-box {
            flex: 0 0 42%; padding: 60px;
            background: var(--glass-bg); backdrop-filter: var(--blur);
            border-radius: 25px; border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-glass); position: relative; z-index: 2;
            transition: transform 0.4s ease, border-color 0.4s ease;
            overflow: hidden; /* מסגרת חיה */
        }

        /* אפקט מסגרת חיה ב-Hover */
        .text-box::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.1), transparent);
            transition: left 0.8s ease;
        }

        .text-box:hover::before { left: 100%; }

        /* עיצוב התאריכים */
        .date-container { margin-bottom: 25px; }
        .hebrew-date { font-family: 'Assistant'; color: var(--gold-bright); font-size: 1.5rem; font-weight: 700; display: block; }
        .latin-date { font-size: 1rem; color: #888; display: block; margin-top: 5px; }

        /* כותרת הפרק */
        .text-box h2 {
            font-family: 'Cinzel Decorative', serif; font-size: 3rem;
            color: #fff; margin: 0 0 25px; line-height: 1.1;
        }

        /* תיאור הפרק */
        .text-box p {
            font-size: 1.15rem; line-height: 2; color: #ddd; margin-top: 25px;
        }

        /* אפקט התמונה הדרמטית עם תנועה */
        .image-box {
            flex: 0 0 42%; overflow: hidden; border-radius: 25px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8);
            transition: transform 0.8s cubic-bezier(0.2, 1, 0.2, 1);
            position: relative;
        }

        .image-box img {
            width: 100%; height: 550px; object-fit: cover; display: block;
            filter: grayscale(100%); transition: filter 1s ease, transform 1s ease;
        }

        /* הובר על כל השורה - אפקטים ויזואליים */
        .story-row:hover .image-box { transform: scale(1.03) translateY(-15px); }
        .story-row:hover .image-box img { filter: grayscale(0%); transform: scale(1.08); }
        .story-row:hover .text-box { transform: scale(1.01); border-color: var(--gold); box-shadow: 0 20px 50px rgba(212, 175, 55, 0.15); }

        /* --- פיצ'ר חדש: טיימר לאחור (Countdown) יוקרתי --- */
        #wedding-countdown {
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; position: relative; overflow: hidden;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        #wedding-countdown h2 {
            font-family: 'Cinzel Decorative', serif; font-size: clamp(2rem, 6vw, 4rem);
            background: linear-gradient(135deg, #fff 0%, var(--gold) 50%, #fff 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.4); margin-bottom: 60px;
        }

        .timer-container {
            display: flex; gap: clamp(10px, 4vw, 30px);
            background: var(--glass-bg); backdrop-filter: var(--blur);
            padding: 40px; border-radius: 30px; border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-glass);
        }

        .timer-block { text-align: center; flex: 0 0 calc(25% - 20px); }
        .timer-block span {
            font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 200; color: #fff; display: block;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }
        .timer-block p { font-size: 1rem; color: var(--gold); margin-top: 10px; font-weight: 600; }

        /* --- כפתור הוספה צף Ultra --- */
        .add-btn-fixed {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            padding: 20px 60px; background: transparent; color: var(--gold);
            border: 2px solid var(--gold); font-family: 'Cinzel Decorative', serif;
            font-size: 1.2rem; border-radius: 50px; cursor: pointer; z-index: 1000;
            transition: 0.5s ease; position: relative; overflow: hidden;
        }

        .add-btn-fixed::after {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%; background: rgba(255, 255, 255, 0.1);
            transform: rotate(45deg); transition: transform 0.8s ease;
        }

        .add-btn-fixed:hover {
            background: var(--gold); color: #000;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.6);
        }

        .add-btn-fixed:hover::after { transform: rotate(45deg) translate(50%, 50%); }

        /* --- מודאל העלאה Ultra (Modal) --- */
        #upload-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(25px);
            z-index: 2000; justify-content: center; align-items: center;
        }

        .modal-content {
            background: var(--glass-bg); padding: 50px; border-radius: 30px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.7); width: 90%; max-width: 550px;
            border: 1px solid var(--gold);
        }

        .modal-content h3 {
            font-family: 'Cinzel Decorative', serif; color: var(--gold-bright);
            text-align: center; margin: 0 0 30px; font-size: 2.2rem;
        }

        .modal-content input, .modal-content textarea {
            width: 100%; padding: 18px; margin: 15px 0;
            background: rgba(255, 255, 255, 0.04); color: white;
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            font-family: 'Assistant', sans-serif; box-sizing: border-box;
            font-size: 1.1rem;
        }

        .modal-content input:focus, .modal-content textarea:focus {
            outline: none; border-color: var(--gold); background: rgba(212, 175, 55, 0.08);
        }

        /* שדה תאריך מיוחד לתצוגה הכהה */
        .modal-content input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1) sepia(100%) saturate(1000%) hue-rotate(10deg);
            cursor: pointer;
        }

        .submit-btn {
            width: 100%; background: var(--gold); color: #000;
            border: none; padding: 22px; border-radius: 12px; cursor: pointer;
            font-family: 'Cinzel Decorative', serif; font-size: 1.2rem;
            transition: 0.4s; margin-top: 25px;
        }

        .submit-btn:hover { background: #fff; box-shadow: 0 0 25px rgba(255, 255, 255, 0.4); }

        /* --- רספונסיביות מוחלטת לנייד --- */
        @media (max-width: 1024px) {
            .story-row, .story-row:nth-child(even) { flex-direction: column; gap: 50px; margin-bottom: 120px; text-align: center; }
            .image-box, .text-box { flex: 0 0 100%; width: 100%; }
            .image-box img { height: 400px; }
            header h1 { font-size: 3.5rem; }
            #wedding-countdown h2 { font-size: 2.2rem; }
            .timer-container { padding: 20px; gap: 15px; }
            .timer-block span { font-size: 3rem; }
        }

        @media (max-width: 600px) {
            header h1 { font-size: 2.8rem; letter-spacing: 2px; }
            header p { font-size: 1.5rem; }
            .text-box h2 { font-size: 2.2rem; }
            .add-btn-fixed { font-size: 1rem; padding: 15px 40px; bottom: 20px; }
        }
    </style>
</head>
<body>

    <div style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; opacity:0.3; background:url('https://www.transparenttextures.com/patterns/dark-dotted-2.png');"></div>

    <header data-aos="fade">
        <h1 data-aos="zoom-out" data-aos-delay="200">הסיפור שלנו</h1>
        <p data-aos="fade-up" data-aos-delay="500">מסע נצחי של אהבה</p>
    </header>

    <div id="story-timeline">
        </div>

    <div id="wedding-countdown" data-aos="fade-up">
        <h2>סופרים את השניות...</h2>
        <div class="timer-container">
            <div class="timer-block">
                <span id="days">00</span>
                <p>ימים</p>
            </div>
            <div class="timer-block">
                <span id="hours">00</span>
                <p>שעות</p>
            </div>
            <div class="timer-block">
                <span id="minutes">00</span>
                <p>דקות</p>
            </div>
            <div class="timer-block">
                <span id="seconds">00</span>
                <p>שניות</p>
            </div>
        </div>
        <p style="font-family:'Cormorant Garamond'; font-size:1.8rem; font-style:italic; margin-top:40px; color:#fff;">עד לפרק הבא ביחד: החתונה שלנו 15.06.2026</p>
    </div>

    <button class="add-btn-fixed" onclick="openModal()">+ הוסף רגע חדש</button>

    <div id="upload-modal">
        <div class="modal-content">
            <h3>יצירת פרק חדש</h3>
            <input type="text" id="chapter-title" placeholder="כותרת (למשל: הצעת הנישואין)">
            <textarea id="chapter-desc" rows="6" placeholder="ספרו קצת על החוויה שלכם..."></textarea>
            
            <label style="font-size: 0.9rem; color: var(--gold-bright);">בחרו תאריך לועזי:</label>
            <input type="date" id="chapter-date">
            
            <label style="font-size: 0.9rem; color: var(--gold-bright);">בחר תמונה מהגלריה:</label>
            <input type="file" id="chapter-file" accept="image/*" style="border:none; padding:5px;">
            <p style="font-size: 0.8rem; color: #888; text-align: center;">*כאן יהיה בעתיד כפתור העלאת קובץ אמיתי</p>
            
            <button class="submit-btn" id="save-btn" onclick="processNewChapter()">פרסם לסיפור</button>
            <button onclick="closeModal()" style="background: none; border: none; color: #999; width: 100%; margin-top: 25px; cursor: pointer; font-size: 1.1rem;">ביטול</button>
        </div>
    </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tilt.js/1.2.1/tilt.jquery.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDrw3XrR4KKfb6fRETtlKG8KFlLidKeuPc",
          authDomain: "ourweddingstory.firebaseapp.com",
          projectId: "ourweddingstory",
          storageBucket: "ourweddingstory.firebasestorage.app",
          messagingSenderId: "110939253444",
          appId: "1:110939253444:web:b491e5951a6ce353d53791",
          measurementId: "G-R77JLJCXKW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // פונקציות עזר לממשק
        window.openModal = () => document.getElementById('upload-modal').style.display = 'flex';
        window.closeModal = () => document.getElementById('upload-modal').style.display = 'none';

        // משיכת נתונים בסדר כרונולוגי עולה (מהישן לחדש)
        async function loadTimeline() {
            const q = query(collection(db, "chapters"), orderBy("timestamp", "asc"));
            const querySnapshot = await getDocs(q);
            const timeline = document.getElementById('story-timeline');
            timeline.innerHTML = '';
            
            let counter = 0;

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const row = document.createElement('div');
                row.className = 'story-row';
                
                // אפקט זיג-זג חכם
                if (counter % 2 !== 0) {
                    row.style.flexDirection = 'row-reverse';
                }

                // אנימציות AOS כיווניות (Fade מהצד)
                row.setAttribute('data-aos', counter % 2 === 0 ? 'fade-left' : 'fade-right');
                
                row.innerHTML = `
                    <div class="image-box"><img src="${data.img}"></div>
                    <div class="text-box" data-tilt data-tilt-max="5" data-tilt-speed="400" data-tilt-perspective="1000">
                        <div class="date-container">
                            <span class="hebrew-date">${data.hebDate}</span>
                            <span class="latin-date">${data.latDate}</span>
                        </div>
                        <h2>${data.title}</h2>
                        <p style="color:#ccc; line-height: 1.8;">${data.desc}</p>
                    </div>
                `;
                timeline.appendChild(row);
                counter++;
            });
            AOS.refresh();
            // הפעלת אפקט Tilt על האלמנטים החדשים
            $('.text-box').tilt({ maxTilt: 5, perspective: 1000 });
        }

        // העלאה ושמירה
        window.processNewChapter = async function() {
            const title = document.getElementById('chapter-title').value;
            const desc = document.getElementById('chapter-desc').value;
            const latinDate = document.getElementById('chapter-date').value;
            const file = document.getElementById('chapter-file').files[0];
            const btn = document.getElementById('save-btn');

            if(!title || !latinDate || !file) return alert("נא למלא את כל השדות ולבחור תמונה");

            btn.disabled = true;
            btn.innerText = "מעלה רגע קסום...";

            try {
                // 1. העלאה ל-Storage
                const storageRef = ref(storage, 'uploads/' + Date.now() + "_" + file.name);
                await uploadBytes(storageRef, file);
                const imgUrl = await getDownloadURL(storageRef);

                // 2. המרה לתאריך עברי
                const [y, m, d] = latinDate.split('-');
                const res = await fetch(`https://www.hebcal.com/converter?cfg=json&gy=${y}&gm=${m}&gd=${d}&g2h=1`);
                const dateData = await res.json();

                // 3. שמירה ל-Firestore
                await addDoc(collection(db, "chapters"), {
                    title, desc, img: imgUrl,
                    hebDate: dateData.hebrew,
                    latDate: `${d}.${m}.${y}`,
                    timestamp: new Date()
                });

                closeModal();
                location.reload();
            } catch (e) {
                console.error(e);
                alert("קרתה שגיאה. וודא שביצעת את כל השלבים ב-Firebase.");
                btn.disabled = false;
                btn.innerText = "פרסם לסיפור";
            }
        };

        // --- סקריפט לטיימר לאחור (Countdown) 2026 ---
        const weddingDate = new Date("June 15, 2026 19:30:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = weddingDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }

        setInterval(updateCountdown, 1000);
        updateCountdown(); // הפעלה ראשונית

        loadTimeline();
    </script>

    <script>
        // אתחול AOS עם הגדרות יוקרה
        AOS.init({ 
            duration: 1200, 
            once: false, // אנימציה תקרה בכל גלילה
            mirror: true // אנימציה גם כשגוללים חזרה למעלה
        });
    </script>
</body>
</html>
