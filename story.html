<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הסיפור שלנו - Wedding Story</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

    <style>
        :root {
            --dark-bg: #030303;
            --glass-bg: rgba(25, 25, 25, 0.6);
            --gold: #d4af37;
            --blur: blur(20px) saturate(180%);
        }

        body {
            margin: 0; background-color: var(--dark-bg); color: #f5f5f5;
            font-family: 'Assistant', sans-serif; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
        }

        header {
            height: 50vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; padding: 20px;
        }

        header h1 {
            font-family: 'Cinzel Decorative', serif; font-size: clamp(2.5rem, 8vw, 5rem);
            color: var(--gold); text-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
        }

        #story-timeline { max-width: 1100px; margin: 0 auto; padding: 20px; padding-bottom: 150px; }

        .story-row {
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 60px; gap: 30px;
        }
        .story-row:nth-child(even) { flex-direction: row-reverse; }

        .image-box { flex: 0 0 45%; border-radius: 20px; overflow: hidden; height: 300px; box-shadow: 0 10px 30px #000; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; }

        .text-box {
            flex: 0 0 45%; padding: 30px; background: var(--glass-bg);
            backdrop-filter: var(--blur); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);
        }

        .hebrew-date { color: var(--gold); font-weight: 700; font-size: 1.2rem; display: block; }
        .latin-date { font-size: 0.8rem; color: #888; margin-bottom: 10px; display: block; }

        /* כפתור הוספה צף - מושלם לאייפון */
        .add-btn-fixed {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 18px 40px; background: var(--gold); color: #000;
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.5); z-index: 1000;
            font-size: 1.1rem;
        }

        /* מודאל העלאה (פופ-אפ) */
        #upload-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 2000;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--glass-bg); padding: 30px; border-radius: 20px;
            width: 90%; max-width: 450px; border: 1px solid var(--gold);
        }
        input, textarea {
            width: 100%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.05);
            color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; box-sizing: border-box;
        }

        .submit-btn {
            width: 100%; padding: 15px; background: var(--gold); border: none;
            border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .story-row, .story-row:nth-child(even) { flex-direction: column; text-align: center; }
            .image-box, .text-box { width: 100%; flex: 0 0 100%; }
        }
    </style>
</head>
<body>

    <header data-aos="fade">
        <h1>הסיפור שלנו</h1>
    </header>

    <div id="story-timeline">
        </div>

    <button class="add-btn-fixed" onclick="openModal()">+ הוסף רגע חדש</button>

    <div id="upload-modal">
        <div class="modal-content">
            <h3 style="color: var(--gold); text-align: center;">הוספת פרק לסיפור</h3>
            <input type="text" id="chapter-title" placeholder="כותרת (למשל: הדייט הראשון)">
            <textarea id="chapter-desc" rows="3" placeholder="מה קרה שם?"></textarea>
            <input type="date" id="chapter-date">
            <input type="text" id="chapter-img" placeholder="קישור לתמונה (URL)">
            <button class="submit-btn" id="save-btn" onclick="processNewChapter()">פרסם</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#888; width:100%; margin-top:15px; cursor:pointer;">ביטול</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDrw3XrR4KKfb6fRETtlKG8KFlLidKeuPc",
          authDomain: "ourweddingstory.firebaseapp.com",
          projectId: "ourweddingstory",
          storageBucket: "ourweddingstory.firebasestorage.app",
          messagingSenderId: "110939253444",
          appId: "1:110939253444:web:b491e5951a6ce353d53791",
          measurementId: "G-R77JLJCXKW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.openModal = () => document.getElementById('upload-modal').style.display = 'flex';
        window.closeModal = () => document.getElementById('upload-modal').style.display = 'none';

        // משיכת נתונים מהענן
        async function loadTimeline() {
            const q = query(collection(db, "chapters"), orderBy("timestamp", "desc"));
            const querySnapshot = await getDocs(q);
            const timeline = document.getElementById('story-timeline');
            timeline.innerHTML = '';

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const row = document.createElement('div');
                row.className = 'story-row';
                row.setAttribute('data-aos', 'fade-up');
                row.innerHTML = `
                    <div class="image-box"><img src="${data.img}"></div>
                    <div class="text-box">
                        <span class="hebrew-date">${data.hebDate}</span>
                        <span class="latin-date">${data.latDate}</span>
                        <h2 style="margin:5px 0;">${data.title}</h2>
                        <p style="color:#ccc;">${data.desc}</p>
                    </div>
                `;
                timeline.appendChild(row);
            });
            AOS.refresh();
        }

        // שמירת נתונים חדשים
        window.processNewChapter = async function() {
            const title = document.getElementById('chapter-title').value;
            const desc = document.getElementById('chapter-desc').value;
            const latinDate = document.getElementById('chapter-date').value;
            const imgUrl = document.getElementById('chapter-img').value;
            const btn = document.getElementById('save-btn');

            if(!title || !latinDate || !imgUrl) return alert("מלא את כל הפרטים!");

            btn.disabled = true;
            btn.innerText = "שומר בענן...";

            try {
                // תרגום תאריך עברי (API חינמי)
                const [y, m, d] = latinDate.split('-');
                const res = await fetch(`https://www.hebcal.com/converter?cfg=json&gy=${y}&gm=${m}&gd=${d}&g2h=1`);
                const dateData = await res.json();

                // שמירה ל-Firestore
                await addDoc(collection(db, "chapters"), {
                    title, desc, img: imgUrl,
                    hebDate: dateData.hebrew,
                    latDate: `${d}.${m}.${y}`,
                    timestamp: new Date()
                });

                closeModal();
                location.reload();
            } catch (e) {
                console.error(e);
                alert("שגיאה בשמירה. וודא שפתחת את Firestore ב-Test Mode.");
                btn.disabled = false;
            }
        };

        loadTimeline();
    </script>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>AOS.init({ duration: 1000, once: true });</script>
</body>
</html>
