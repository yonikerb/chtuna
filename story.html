<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הסיפור שלנו - Signature Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600&family=Playfair+Display:ital,wght@0,700;1,400&family=Tinos:ital@1&family=Amatic+SC:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

    <style>
        :root {
            --dark-bg: #030303;
            --glass: rgba(15, 15, 15, 0.95);
            --gold: #d4af37;
            --gold-light: #f1d592;
            --text: #f0f0f0;
        }

        body {
            margin: 0; padding: 0; background-color: var(--dark-bg); color: var(--text);
            font-family: 'Assistant', sans-serif; overflow-x: hidden;
            background-image: radial-gradient(circle at top, #151515 0%, #030303 100%);
        }

        /* הדר יוקרתי עם כתיבה חיה */
        header {
            height: 35vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center;
        }

        header h1 {
            font-family: 'Playfair Display', serif; font-size: 3.2rem;
            color: var(--gold); margin: 0; letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* אנימציית כתיבה ידנית */
        .signature {
            font-family: 'Amatic SC', cursive; font-size: 2.2rem;
            color: var(--gold-light); margin-top: 5px;
            white-space: nowrap; overflow: hidden;
            width: 0; /* מתחיל מאפס */
            animation: typing 2.5s steps(20, end) forwards;
            animation-delay: 0.8s;
            border-left: 2px solid transparent; /* סמן כתיבה אם תרצה */
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 180px; } /* התאם לפי אורך השם */
        }

        #story-timeline { max-width: 850px; margin: 0 auto; padding: 15px; padding-bottom: 50px; }

        /* כרטיס עם פס זהב מסתובב */
        .story-card, .next-chapter-card {
            display: flex; position: relative; overflow: hidden;
            border-radius: 25px; margin-bottom: 50px; padding: 1.5px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
        }

        .story-card::before, .next-chapter-card::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--gold));
            animation: rotateBorder 4s linear infinite;
        }

        @keyframes rotateBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .card-inner {
            display: flex; width: 100%; background: #080808;
            border-radius: 23px; overflow: hidden; position: relative; z-index: 1;
        }

        /* אלומת אור על התמונה */
        .image-box { position: relative; overflow: hidden; flex: 0 0 40%; }
        
        .image-box::after {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.15), transparent);
            transform: skewX(-25deg);
            animation: imageShine 5s infinite;
        }

        @keyframes imageShine {
            0% { left: -150%; }
            30% { left: 150%; }
            100% { left: 150%; }
        }

        .image-box img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* טקסט ועיצוב */
        .text-box { flex: 1; padding: 25px; display: flex; flex-direction: column; justify-content: center; }
        .hebrew-date { color: var(--gold-light); font-weight: 600; font-size: 0.85rem; }
        .latin-date { font-size: 0.7rem; color: #444; margin-bottom: 5px; }
        .text-box h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--gold); margin: 8px 0; }
        .text-box p { font-size: 0.95rem; line-height: 1.6; color: #bbb; }

        @media (max-width: 768px) {
            .card-inner { flex-direction: column !important; }
            .image-box { width: 100%; height: 240px; }
            .story-card:nth-child(even) .text-box { text-align: left; }
            .story-card:nth-child(odd) .text-box { text-align: right; }
            header h1 { font-size: 2.2rem; }
            .signature { font-size: 1.8rem; }
        }

        /* באנר הפרק הבא */
        .next-chapter-inner {
            background: linear-gradient(135deg, #0a0a0a 0%, #151515 100%);
            display: flex; align-items: center; width: 100%; padding: 40px;
            border-radius: 23px; position: relative; z-index: 1; justify-content: center;
        }
        .question-mark { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--gold); margin-left: 15px; }
        .next-text { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: #fff; }
    </style>
</head>
<body>

    <header>
        <h1 data-aos="fade-down">הסיפור שלנו</h1>
        <div class="signature">יהונתן & יעל</div>
    </header>

    <div id="story-timeline"></div>

    <div id="timeline-footer" style="max-width: 850px; margin: 0 auto; padding: 0 15px 120px;">
        <div class="next-chapter-card" onclick="openModal()" data-aos="zoom-in">
            <div class="next-chapter-inner">
                <div class="question-mark">?</div>
                <div class="next-text">אז מה הפרק הבא?</div>
            </div>
        </div>
    </div>

    <div id="upload-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.97); backdrop-filter:blur(15px); z-index:2000; justify-content:center; align-items:center;">
        <div style="background:#111; padding:30px; border-radius:25px; width:85%; max-width:400px; border:1px solid var(--gold);">
            <h3 style="color:var(--gold); text-align:center; font-family:'Playfair Display';">הוספת רגע חדש</h3>
            <input type="text" id="chapter-title" placeholder="כותרת" style="width:100%; padding:12px; margin:10px 0; background:#1a1a1a; color:#fff; border:1px solid #333; border-radius:10px;">
            <textarea id="chapter-desc" rows="4" placeholder="מה קרה שם?" style="width:100%; padding:12px; margin:10px 0; background:#1a1a1a; color:#fff; border:1px solid #333; border-radius:10px;"></textarea>
            <input type="date" id="chapter-date" style="width:100%; padding:12px; margin:10px 0; background:#1a1a1a; color:#fff; border:1px solid #333; border-radius:10px;">
            <input type="file" id="chapter-file" accept="image/*" style="width:100%; padding:12px; margin:10px 0; color:#888;">
            <button id="save-btn" onclick="processNewChapter()" style="width:100%; background:var(--gold); color:#000; padding:15px; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">פרסם לסיפור</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#555; width:100%; margin-top:15px; cursor:pointer;">ביטול</button>
        </div>
    </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDrw3XrR4KKfb6fRETtlKG8KFlLidKeuPc",
          authDomain: "ourweddingstory.firebaseapp.com",
          projectId: "ourweddingstory",
          storageBucket: "ourweddingstory.firebasestorage.app",
          messagingSenderId: "110939253444",
          appId: "1:110939253444:web:b491e5951a6ce353d53791"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        window.openModal = () => document.getElementById('upload-modal').style.display = 'flex';
        window.closeModal = () => document.getElementById('upload-modal').style.display = 'none';

        async function loadTimeline() {
            const q = query(collection(db, "chapters"), orderBy("timestamp", "asc"));
            const querySnapshot = await getDocs(q);
            const timeline = document.getElementById('story-timeline');
            timeline.innerHTML = '';
            
            let counter = 0;
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const card = document.createElement('div');
                card.className = 'story-card';
                card.setAttribute('data-aos', counter % 2 === 0 ? 'fade-left' : 'fade-right');
                
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="image-box"><img src="${data.img}"></div>
                        <div class="text-box">
                            <span class="hebrew-date">${data.hebDate}</span>
                            <span class="latin-date">${data.latDate}</span>
                            <h2>${data.title}</h2>
                            <p>${data.desc}</p>
                        </div>
                    </div>
                `;
                timeline.appendChild(card);
                counter++;
            });
            AOS.refresh();
        }

        window.processNewChapter = async function() {
            const title = document.getElementById('chapter-title').value;
            const desc = document.getElementById('chapter-desc').value;
            const latinDate = document.getElementById('chapter-date').value;
            const file = document.getElementById('chapter-file').files[0];
            const btn = document.getElementById('save-btn');

            if(!title || !latinDate || !file) return alert("מלא את כל הפרטים");
            btn.disabled = true;

            try {
                const storageRef = ref(storage, 'uploads/' + Date.now() + "_" + file.name);
                await uploadBytes(storageRef, file);
                const imgUrl = await getDownloadURL(storageRef);
                const [y, m, d] = latinDate.split('-');
                const res = await fetch(`https://www.hebcal.com/converter?cfg=json&gy=${y}&gm=${m}&gd=${d}&g2h=1`);
                const dateData = await res.json();

                await addDoc(collection(db, "chapters"), {
                    title, desc, img: imgUrl, hebDate: dateData.hebrew, latDate: `${d}.${m}.${y}`, timestamp: new Date()
                });
                location.reload();
            } catch (e) { alert("שגיאה!"); btn.disabled = false; }
        };

        loadTimeline();
        AOS.init({ duration: 1000, once: true });
    </script>
</body>
</html>
