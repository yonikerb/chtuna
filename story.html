<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הסיפור שלנו - Gold Frame Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

    <style>
        :root {
            --dark-bg: #050505;
            --glass: rgba(20, 20, 20, 0.8);
            --gold: #d4af37;
            --gold-light: #f1d592;
            --text: #f0f0f0;
        }

        body {
            margin: 0; padding: 0; background-color: var(--dark-bg); color: var(--text);
            font-family: 'Assistant', sans-serif; overflow-x: hidden;
            background-image: radial-gradient(circle at top, #1a1a1a 0%, #050505 100%);
        }

        header {
            height: 25vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center;
        }

        header h1 {
            font-family: 'Cinzel Decorative', serif; font-size: 2.5rem;
            color: var(--gold); margin: 0;
        }

        #story-timeline { max-width: 800px; margin: 0 auto; padding: 15px; padding-bottom: 50px; }

        /* כרטיס עם אנימציית פס זהב מסתובב */
        .story-card, .next-chapter-card {
            display: flex; align-items: center; 
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 20px; margin-bottom: 40px; 
            position: relative; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            padding: 2px; /* מרווח לפס הזהב */
        }

        /* האנימציה של הפס שרץ מסביב */
        .story-card::before, .next-chapter-card::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--gold));
            animation: rotateBorder 4s linear infinite;
        }

        @keyframes rotateBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* שכבת התוכן הפנימית כדי שלא יראו את מרכז האנימציה */
        .card-inner {
            display: flex; width: 100%; height: 100%;
            background: #0a0a0a; border-radius: 18px;
            overflow: hidden; position: relative; z-index: 1;
        }

        .story-card:nth-child(even) .card-inner { flex-direction: row-reverse; }

        /* טיפול בתמונה - לא גזורה ולא מרוחה */
        .image-box { flex: 0 0 35%; display: flex; align-items: center; background: #000; }
        .image-box img { width: 100%; height: auto; object-fit: contain; display: block; }

        .text-box { flex: 1; padding: 20px; display: flex; flex-direction: column; justify-content: center; }

        .hebrew-date { color: var(--gold-light); font-weight: 600; font-size: 0.85rem; }
        .latin-date { font-size: 0.7rem; color: #555; margin-bottom: 5px; }

        /* כותרת בצהוב/זהב */
        .text-box h2 {
            font-family: 'Cinzel Decorative', serif; font-size: 1.3rem;
            color: var(--gold); margin: 8px 0;
        }

        .text-box p { font-size: 0.95rem; line-height: 1.6; color: #ccc; margin: 0; }

        /* באנר "מה הפרק הבא" */
        .next-chapter-card { cursor: pointer; border: none; background: none; width: 100%; padding: 2px; }
        .next-chapter-inner {
            background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
            display: flex; align-items: center; width: 100%; padding: 25px;
            border-radius: 18px; position: relative; z-index: 1;
        }

        .question-mark {
            font-family: 'Cinzel Decorative', serif; font-size: 3.5rem;
            color: var(--gold); text-shadow: 0 0 20px rgba(212,175,55,0.8);
            margin-left: 25px; flex: 0 0 60px; text-align: center;
        }

        .next-text { font-family: 'Cinzel Decorative', serif; font-size: 1.5rem; color: #fff; }

        /* מודאל */
        #upload-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); z-index: 2000;
            justify-content: center; align-items: center;
        }
        .modal-content { background: #111; padding: 25px; border-radius: 25px; width: 85%; max-width: 400px; border: 1px solid var(--gold); }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 10px; box-sizing: border-box; }
        .submit-btn { width: 100%; background: var(--gold); color: #000; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        @media (max-width: 600px) {
            .image-box { flex: 0 0 30%; }
            .text-box { padding: 15px; }
            .next-text { font-size: 1.2rem; }
            .question-mark { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <header data-aos="fade">
        <h1>הסיפור שלנו</h1>
    </header>

    <div id="story-timeline">
        </div>

    <div id="timeline-footer" style="max-width: 800px; margin: 0 auto; padding: 0 15px 100px;">
        <div class="next-chapter-card" onclick="openModal()" data-aos="zoom-in">
            <div class="next-chapter-inner">
                <div class="question-mark">?</div>
                <div class="next-text">אז מה הפרק הבא ?</div>
            </div>
        </div>
    </div>

    <div id="upload-modal">
        <div class="modal-content">
            <h3 style="color: var(--gold); text-align: center; margin-top: 0;">הוספת רגע חדש</h3>
            <input type="text" id="chapter-title" placeholder="כותרת">
            <textarea id="chapter-desc" rows="4" placeholder="מה קרה שם?"></textarea>
            <input type="date" id="chapter-date">
            <input type="file" id="chapter-file" accept="image/*">
            <button class="submit-btn" id="save-btn" onclick="processNewChapter()">פרסם לסיפור</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#555; width:100%; margin-top:15px; cursor:pointer;">ביטול</button>
        </div>
    </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDrw3XrR4KKfb6fRETtlKG8KFlLidKeuPc",
          authDomain: "ourweddingstory.firebaseapp.com",
          projectId: "ourweddingstory",
          storageBucket: "ourweddingstory.firebasestorage.app",
          messagingSenderId: "110939253444",
          appId: "1:110939253444:web:b491e5951a6ce353d53791"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        window.openModal = () => document.getElementById('upload-modal').style.display = 'flex';
        window.closeModal = () => document.getElementById('upload-modal').style.display = 'none';

        async function loadTimeline() {
            const q = query(collection(db, "chapters"), orderBy("timestamp", "asc"));
            const querySnapshot = await getDocs(q);
            const timeline = document.getElementById('story-timeline');
            timeline.innerHTML = '';
            
            let counter = 0;
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const card = document.createElement('div');
                card.className = 'story-card';
                card.setAttribute('data-aos', 'fade-up');
                
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="image-box"><img src="${data.img}"></div>
                        <div class="text-box">
                            <span class="hebrew-date">${data.hebDate}</span>
                            <span class="latin-date">${data.latDate}</span>
                            <h2>${data.title}</h2>
                            <p>${data.desc}</p>
                        </div>
                    </div>
                `;
                timeline.appendChild(card);
                counter++;
            });
            AOS.refresh();
        }

        window.processNewChapter = async function() {
            const title = document.getElementById('chapter-title').value;
            const desc = document.getElementById('chapter-desc').value;
            const latinDate = document.getElementById('chapter-date').value;
            const file = document.getElementById('chapter-file').files[0];
            const btn = document.getElementById('save-btn');

            if(!title || !latinDate || !file) return alert("מלא את כל הפרטים");
            btn.disabled = true;

            try {
                const storageRef = ref(storage, 'uploads/' + Date.now() + "_" + file.name);
                await uploadBytes(storageRef, file);
                const imgUrl = await getDownloadURL(storageRef);
                const [y, m, d] = latinDate.split('-');
                const res = await fetch(`https://www.hebcal.com/converter?cfg=json&gy=${y}&gm=${m}&gd=${d}&g2h=1`);
                const dateData = await res.json();

                await addDoc(collection(db, "chapters"), {
                    title, desc, img: imgUrl, hebDate: dateData.hebrew, latDate: `${d}.${m}.${y}`, timestamp: new Date()
                });
                location.reload();
            } catch (e) { alert("שגיאה!"); btn.disabled = false; }
        };

        loadTimeline();
        AOS.init({ duration: 800, once: true });
    </script>
</body>
</html>
